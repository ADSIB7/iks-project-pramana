<svg viewBox="0 0 100 100" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <g id="outer-mark">
            <line x1="50" y1="5" x2="50" y2="9" stroke="#FF8F00" stroke-width="0.5"/>
            <circle cx="50" cy="11" r="0.8" fill="#ffad33"/>
        </g>
        <g id="middle-glyph">
            <path d="M48 22 Q50 20 52 22 T51 26 M49 21 L53 21" fill="none" stroke="#FF8F00" stroke-width="0.6" stroke-linecap="round"/>
            <line x1="50" y1="26" x2="50" y2="29" stroke="#FF8F00" stroke-width="0.4"/>
            <path d="M48 29 A2 2 0 0 0 52 29" fill="none" stroke="#ffad33" stroke-width="0.8" />
        </g>
        <g id="inner-petal">
            <path d="M50 33 Q53 38 50 41 Q47 38 50 33" fill="none" stroke="#FF8F00" stroke-width="0.5" />
            <circle cx="50" cy="38" r="0.5" fill="#ffad33"/>
        </g>
        <g id="core-yantra">
            <polygon points="50,44 45,54 55,54" fill="none" stroke="#FF8F00" stroke-width="0.7"/>
            <polygon points="50,56 45,46 55,46" fill="none" stroke="#ffad33" stroke-width="0.7"/>
            <circle cx="50" cy="50" r="1.5" fill="#ffad33"/>
        </g>
        <filter id="svg-glow">
            <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <circle cx="50" cy="50" r="48" fill="#0b0b0f" opacity="0.6" />

    <g style="transform-origin: 50px 50px;">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#cc7300" stroke-width="0.3" />
        <circle cx="50" cy="50" r="42" fill="none" stroke="#FF8F00" stroke-width="0.6" stroke-dasharray="1 3" />
        <circle cx="50" cy="50" r="39" fill="none" stroke="#cc7300" stroke-width="0.3" />
        <use href="#outer-mark" />
        <use href="#outer-mark" transform="rotate(30 50 50)"/>
        <use href="#outer-mark" transform="rotate(60 50 50)"/>
        <use href="#outer-mark" transform="rotate(90 50 50)"/>
        <use href="#outer-mark" transform="rotate(120 50 50)"/>
        <use href="#outer-mark" transform="rotate(150 50 50)"/>
        <use href="#outer-mark" transform="rotate(180 50 50)"/>
        <use href="#outer-mark" transform="rotate(210 50 50)"/>
        <use href="#outer-mark" transform="rotate(240 50 50)"/>
        <use href="#outer-mark" transform="rotate(270 50 50)"/>
        <use href="#outer-mark" transform="rotate(300 50 50)"/>
        <use href="#outer-mark" transform="rotate(330 50 50)"/>
    </g>

    <g style="transform-origin: 50px 50px;">
        <circle cx="50" cy="50" r="30" fill="none" stroke="#FF8F00" stroke-width="0.5" stroke-dasharray="8 3" />
        <circle cx="50" cy="50" r="16.5" fill="none" stroke="#cc7300" stroke-width="0.4" />
        <use href="#middle-glyph" />
        <use href="#middle-glyph" transform="rotate(45 50 50)"/>
        <use href="#middle-glyph" transform="rotate(90 50 50)"/>
        <use href="#middle-glyph" transform="rotate(135 50 50)"/>
        <use href="#middle-glyph" transform="rotate(180 50 50)"/>
        <use href="#middle-glyph" transform="rotate(225 50 50)"/>
        <use href="#middle-glyph" transform="rotate(270 50 50)"/>
        <use href="#middle-glyph" transform="rotate(315 50 50)"/>
    </g>

    <g style="transform-origin: 50px 50px;">
        <circle cx="50" cy="50" r="12" fill="none" stroke="#ffad33" stroke-width="0.6" stroke-dasharray="1 4" />
        <use href="#inner-petal" />
        <use href="#inner-petal" transform="rotate(60 50 50)"/>
        <use href="#inner-petal" transform="rotate(120 50 50)"/>
        <use href="#inner-petal" transform="rotate(180 50 50)"/>
        <use href="#inner-petal" transform="rotate(240 50 50)"/>
        <use href="#inner-petal" transform="rotate(300 50 50)"/>
    </g>

    <g style="transform-origin: 50px 50px;" filter="url(#svg-glow)">
        <use href="#core-yantra" />
    </g>
</svg>
